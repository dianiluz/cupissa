<header class="header">

  <div class="nav">

    <!-- LOGO -->
    <a href="/index.html" class="logo-link" aria-label="Ir al inicio">
      <img src="/assets/logo.png" class="logo" alt="Logo Cupissa">
    </a>

    <!-- NAV -->
    <nav class="main-nav" aria-label="Navegación principal">
      <a href="/index.html">Universo Cupissa</a>
      <a href="/catalogo/index.html">Catálogo</a>
      <a href="/rastreo/index.html">Seguimiento</a>
    </nav>

    <!-- BUSCADOR -->
    <div class="search-box">
      <input 
        type="text" 
        id="buscadorGlobal"
        placeholder="Buscar en todo Cupissa..."
        aria-label="Buscar productos">
    </div>

    <!-- ICONOS -->
    <div class="nav-icons">

      <button class="icon-btn glow" id="btnFavoritos" aria-label="Abrir favoritos">
        ❤️
        <span id="favCount" class="counter">0</span>
      </button>

      <button class="icon-btn glow" id="btnCarrito" aria-label="Abrir carrito">
        🛒
        <span id="cartCount" class="counter">0</span>
      </button>

    </div>

  </div>

</header>

<!-- OVERLAY -->
<div id="overlayPanel" class="overlay-carrito"></div>

<!-- PANEL CARRITO -->
<div id="carritoPanel" class="side-panel panel-carrito" role="dialog" aria-hidden="true">
  <div class="sheet-indicator"></div>
  <div class="panel-header">
    <h2 id="tituloCarrito">Tu Carrito</h2>
    <button class="cerrar-panel" aria-label="Cerrar carrito">✖</button>
  </div>

  <div id="carritoItems" class="panel-items"></div>

  <div class="panel-footer">
    <button id="btnSolicitarCotizacion" class="btn-enviar">
      Solicitar Cotización
    </button>
    <button id="btnVaciarCarrito" class="btn-vaciar">
      Vaciar Carrito
    </button>
  </div>
</div>

<!-- PANEL FAVORITOS -->
<div id="favoritosPanel" class="side-panel panel-favoritos" role="dialog" aria-hidden="true">
  <div class="sheet-indicator"></div>
  <div class="panel-header">
    <h2>Favoritos</h2>
    <button class="cerrar-panel" aria-label="Cerrar favoritos">✖</button>
  </div>

  <div id="favoritosItems" class="panel-items"></div>

  <div class="panel-footer">
    <button id="btnAgregarTodos" class="btn-enviar">
      Agregar todos al carrito
    </button>
  </div>
</div>
