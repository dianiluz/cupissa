<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUPISSA - Mi Panel</title>
    <link rel="icon" href="/assets/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/panel.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section id="viewLogin" class="auth-wrapper view-hidden">
            <div class="auth-card fade-in">
                <h1 class="auth-title">Bienvenido</h1>
                <p class="auth-subtitle">Inicia sesión en tu cuenta Cupissa</p>
                <form id="formLogin" class="auth-form">
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="loginEmail" required placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <div class="auth-options">
                        <label><input type="checkbox" id="loginRemember"> Recuérdame</label>
                        <a href="#" class="auth-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div id="loginError" class="auth-error"></div>
                    <button type="submit" class="btn-primary btn-block" id="btnLoginSubmit">Ingresar</button>
                    <p style="text-align: center; margin-top: 10px; font-size: 0.9rem;">
                        ¿No tienes cuenta? <button type="button" class="auth-link" onclick="Auth.switchView('viewRegister')">Regístrate aquí</button>
                    </p>
                </form>
            </div>
        </section>

        <section id="viewRegister" class="auth-wrapper view-hidden">
            <div class="auth-card fade-in" style="max-width: 600px;">
                <h1 class="auth-title">Crear Cuenta</h1>
                <p class="auth-subtitle">Únete a la familia Cupissa</p>
                <form id="formRegister" class="auth-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="regNombre" required>
                        </div>
                        <div class="form-group">
                            <label>Cédula (CC) <span style="font-size:0.8rem; color:gray;">(Opcional)</span></label>
                         <input type="text" id="regCC">
                        </div>
                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Teléfono (WhatsApp)</label>
                            <input type="tel" id="regTelefono" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div id="regError" class="auth-error"></div>
                    <button type="submit" class="btn-primary btn-block" id="btnRegSubmit">Crear Cuenta</button>
                    <p style="text-align: center; margin-top: 10px; font-size: 0.9rem;">
                        ¿Ya tienes cuenta? <button type="button" class="auth-link" onclick="Auth.switchView('viewLogin')">Inicia sesión</button>
                    </p>
                </form>
            </div>
        </section>

        <section id="viewDashboard" class="panel-wrapper view-hidden">
            <aside class="panel-sidebar">
                <div class="user-info-card">
                    <div class="user-avatar" id="panelAvatar">U</div>
                    <div class="user-name" id="panelUserName">Cargando...</div>
                    <div class="user-role" id="panelUserRole">...</div>
                </div>
                <nav class="panel-nav" id="panelNav">
                    </nav>
                <button class="panel-nav-btn btn-logout" onclick="Auth.logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </aside>
            <main class="panel-main" id="panelContentArea">
                </main>
        </section>
    </main>

    <div id="footer"></div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/carrito.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/panel.js"></script>
</body>
</html>
