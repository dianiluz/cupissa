<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ============================= -->
  <!-- META BÁSICO -->
  <!-- ============================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Catálogo | CUPISSA</title>
  <meta name="description" content="Explora el catálogo oficial de CUPISSA. Personaliza camisetas, tazas, conjuntos y más con envío rápido y atención personalizada.">

  <!-- ============================= -->
  <!-- FAVICON -->
  <!-- ============================= -->
  <link rel="icon" href="/assets/favicon.png" type="image/png">

  <!-- ============================= -->
  <!-- CSS -->
  <!-- ============================= -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/catalogo.css">
</head>

<body>

  <!-- ============================= -->
  <!-- HEADER -->
  <!-- ============================= -->
  <header id="header"></header>

  <!-- ============================= -->
  <!-- MUNDOS + FILTROS MOBILE -->
  <!-- ============================= -->
  <div class="mundos-container" id="mundos-container" aria-label="Categorías del catálogo">

    <button 
      class="btn-filtros-mobile"
      id="btnFiltrosMobile"
      type="button"
      aria-label="Abrir filtros">
      ☰ Filtros
    </button>

  </div>

  <!-- ============================= -->
  <!-- CONTENIDO PRINCIPAL -->
  <!-- ============================= -->
  <main class="catalogo-main" role="main">

    <div class="catalogo-layout">

      <!-- FILTROS -->
      <aside 
        class="filtros-lateral" 
        id="filtros-lateral"
        aria-label="Filtros de productos">
      </aside>

      <!-- PRODUCTOS -->
      <section 
        class="productos-wrapper"
        aria-label="Listado de productos">

        <div 
          id="productos-container" 
          class="grid-productos">
        </div>

      </section>

    </div>

  </main>

  <!-- ============================= -->
  <!-- OVERLAY FILTROS MOBILE -->
  <!-- ============================= -->
  <div 
    id="overlayFiltros" 
    class="overlay-filtros"
    aria-hidden="true">
  </div>

  <!-- ============================= -->
  <!-- FOOTER DINÁMICO -->
  <!-- ============================= -->
  <footer id="footer"></footer>

  <!-- ============================= -->
  <!-- NOSCRIPT FALLBACK -->
  <!-- ============================= -->
  <noscript>
    <p style="text-align:center; padding:20px;">
      Esta página requiere JavaScript para mostrar el catálogo correctamente.
    </p>
  </noscript>

  <!-- ============================= -->
  <!-- JS (DEFER PARA RENDIMIENTO) -->
  <!-- ============================= -->
  <script src="/js/core.js" defer></script>
  <script src="/js/carrito.js" defer></script>
  <script src="/js/favoritos.js" defer></script>
  <script src="/js/catalogo.js" defer></script>

</body>
</html>
