<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CUPISSA</title>
    <link rel="icon" href="/assets/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/pago.css">
    <style>
        .suggestions { position: absolute; width: 100%; background: white; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; z-index: 100; display: none; border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .sug-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .sug-item:hover { background: #fff0f7; color: var(--color-pink); }
    </style>
</head>
<body>
    <div id="header"></div>

    <main class="checkout-wrapper">
        <div class="checkout-main">
            <div class="checkout-steps-nav">
                <div class="step-indicator active" id="ind-1">1</div>
                <div class="step-indicator" id="ind-2">2</div>
                <div class="step-indicator" id="ind-3">3</div>
                <div class="step-indicator" id="ind-4">4</div>
            </div>

            <div class="step-content active" id="step-1">
                <h2 class="step-title">Información y Dirección</h2>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Correo Electrónico</label>
                        <input type="email" id="chkEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="chkNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono / WhatsApp</label>
                        <input type="tel" id="chkTelefono" required>
                    </div>
                    <div class="form-group">
                        <label>Departamento</label>
                        <select id="chkDepartamento" required onchange="Checkout.loadCities()"></select>
                    </div>
                    <div class="form-group">
                        <label>Municipio / Ciudad</label>
                        <select id="chkCiudad" required onchange="Checkout.handleMunicipioChange()"></select>
                    </div>
                    
                    <div class="form-group full-width" id="barrio-container" style="display:none; position:relative;">
                        <label>Escribe tu Barrio (Para calcular domicilio)</label>
                        <input type="text" id="chkBarrioBuscador" placeholder="Escriba para buscar barrio..." autocomplete="off">
                        <div id="suggestions" class="suggestions"></div>
                        <input type="hidden" id="chkBarrio" required>
                        <div id="aviso-barrio" style="font-size: 0.85rem; color: var(--color-pink); margin-top: 5px;"></div>
                    </div>
                    
                    <div class="form-group full-width" id="barrio-manual" style="display:block;">
                        <label>Barrio</label>
                        <input type="text" id="chkBarrioManual">
                    </div>

                    <div class="form-group full-width">
                        <label>Dirección Completa</label>
                        <input type="text" id="chkDireccion" placeholder="Ej: Calle 123 # 45-67 Apto 801" required>
                    </div>
                    
                    <div class="form-group" id="containerCC">
                        <label>Cédula de Ciudadanía (CC) <span id="lblCCOpcional" style="font-size:0.8rem; color:gray;"></span></label>
                        <input type="text" id="chkCC">
                    </div>
                </div>
                <div class="step-actions" style="justify-content: flex-end;">
                    <button class="btn-primary" onclick="Checkout.nextStep(2)">Continuar al Envío</button>
                </div>
            </div>

            <div class="step-content" id="step-2">
                <h2 class="step-title">Método de Envío</h2>
                <div id="opcionesEnvio"></div>

                <h2 class="step-title" style="margin-top: 2rem;">Tiempo de Producción</h2>
                <label class="radio-card selected" onclick="Checkout.selectProduccion('normal')">
                    <input type="radio" name="tipoProduccion" value="normal" checked>
                    <div class="radio-content">
                        <span class="radio-title">Normal (5 a 8 días hábiles)</span>
                        <span class="radio-desc">Hasta 15 días si supera los $999.999. Gratis.</span>
                    </div>
                </label>
                <div id="opcionesExpress"></div>
                
                <div class="step-actions">
                    <button class="btn-secondary" onclick="Checkout.prevStep(1)">Volver</button>
                    <button class="btn-primary" onclick="Checkout.nextStep(3)">Continuar al Pago</button>
                </div>
            </div>

            <div class="step-content" id="step-3">
                <h2 class="step-title">¿Cuánto deseas pagar hoy?</h2>
                <label class="radio-card selected" onclick="Checkout.selectTipoPago('anticipo')">
                    <input type="radio" name="tipoMonto" value="anticipo" checked>
                    <div class="radio-content">
                        <span class="radio-title">Solo Anticipo (20%)</span>
                        <span class="radio-desc">Paga el saldo restante al finalizar producción o contraentrega.</span>
                    </div>
                </label>
                <label class="radio-card" onclick="Checkout.selectTipoPago('total')">
                    <input type="radio" name="tipoMonto" value="total">
                    <div class="radio-content">
                        <span class="radio-title">Pago Total (100%)</span>
                        <span class="radio-desc">Paga todo tu pedido ahora.</span>
                    </div>
                </label>

                <h2 class="step-title" style="margin-top: 2rem;">Método de Pago</h2>
                <label class="radio-card" onclick="Checkout.selectPago('transferencia')">
                    <input type="radio" name="metodoPago" value="transferencia" checked>
                    <div class="radio-content">
                        <span class="radio-title">Transferencia Directa (Bancolombia / Nequi)</span>
                        <span class="radio-desc">Sin comisiones.</span>
                    </div>
                </label>
                <label class="radio-card" onclick="Checkout.selectPago('wompi')">
                    <input type="radio" name="metodoPago" value="wompi">
                    <div class="radio-content">
                        <span class="radio-title">Wompi (Tarjetas, PSE, Nequi)</span>
                        <span class="radio-desc">Comisión: 2.65% + $700 + IVA sobre el valor a pagar.</span>
                    </div>
                </label>
                <label class="radio-card" onclick="Checkout.selectPago('addi')">
                    <input type="radio" name="metodoPago" value="addi">
                    <div class="radio-content">
                        <span class="radio-title">Addi (Compra a cuotas)</span>
                        <span class="radio-desc">Comisión: 9% + IVA sobre el valor a pagar.</span>
                    </div>
                </label>
                <label class="radio-card" id="optContraentrega" onclick="Checkout.selectPago('contraentrega')" style="display: none;">
                    <input type="radio" name="metodoPago" value="contraentrega">
                    <div class="radio-content">
                        <span class="radio-title">Contraentrega</span>
                        <span class="radio-desc" id="descContraentrega"></span>
                    </div>
                </label>

                <div class="step-actions">
                    <button class="btn-secondary" onclick="Checkout.prevStep(2)">Volver</button>
                    <button class="btn-primary" onclick="Checkout.nextStep(4)">Ver Resumen Final</button>
                </div>
            </div>

            <div class="step-content" id="step-4">
                <h2 class="step-title">Confirmar Pedido</h2>
                <div id="resumenDatosFinales" style="background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; line-height: 1.8;"></div>
                <div id="errorCheckout" style="color: red; margin-bottom: 15px; display: none;"></div>
                <div class="step-actions">
                    <button class="btn-secondary" onclick="Checkout.prevStep(3)">Volver</button>
                    <button class="btn-primary" id="btnConfirmarPedido" onclick="Checkout.submitPedido()" style="background-color: var(--color-success);">Confirmar y Generar Pedido</button>
                </div>
            </div>
        </div>

        <aside class="checkout-sidebar">
            <h3 class="summary-title">Resumen del Pedido</h3>
            <div class="summary-items" id="chkSummaryItems"></div>
            
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal Productos:</span>
                    <span id="chkSubtotal"></span>
                </div>
                <div class="summary-row" id="rowProduccion" style="display:none;">
                    <span>Producción Express:</span>
                    <span id="chkProduccionValor"></span>
                </div>
                <div class="summary-row" id="rowEnvio">
                    <span>Envío/Domicilio:</span>
                    <span id="chkEnvioValor">Por calcular</span>
                </div>
                <div class="summary-row" style="font-weight:bold; border-top: 1px solid #ddd; padding-top:10px; margin-top:10px;">
                    <span>Total Pedido:</span>
                    <span id="chkTotalPedido"></span>
                </div>
                
                <div style="background: var(--color-white); padding: 15px; border-radius: var(--radius-sm); margin-top: 20px; border-left: 4px solid var(--color-pink);">
                    <div class="summary-row">
                        <span id="lblMontoAPagar" style="font-weight:bold;">Monto a pagar hoy:</span>
                        <span id="chkMontoBaseValor" style="font-weight:bold;"></span>
                    </div>
                    <div class="summary-row" id="rowComision" style="display:none; color: var(--color-danger); font-size: 0.85rem;">
                        <span>Comisión Pasarela:</span>
                        <span id="chkComisionValor"></span>
                    </div>
                    <div class="summary-row total" style="color: var(--color-pink);">
                        <span>TOTAL A PAGAR:</span>
                        <span id="chkTotalGeneral"></span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <div id="footer"></div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/carrito.js"></script>
    <script src="/js/footer.js"></script>
    <script src="/js/pago.js"></script>
</body>
</html>
