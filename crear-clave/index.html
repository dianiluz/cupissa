<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear contraseña - CUPISSA</title>
<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/animations.css">
<style>
body {
  padding-top: 0 !important;
}
</style>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh; margin:0; padding-top:0;">

<div style="width:320px; background:#111; padding:30px; border-radius:12px; position:relative; z-index:10;">

<!-- HEADER INYECTADO -->
<div id="header"></div>

<h2>Crear contraseña</h2>

<input type="password" id="password1" placeholder="Nueva contraseña" style="width:100%;margin-bottom:10px;">
<input type="password" id="password2" placeholder="Confirmar contraseña" style="width:100%;margin-bottom:10px;">

<button onclick="activarPassword()" style="width:100%;">Guardar</button>

<p id="mensaje"></p>

</div>

<!-- FOOTER INYECTADO -->
<div id="footer"></div>

<!-- BOTÓN FLOTANTE WHATSAPP -->
<a href="https://wa.me/573147671380" target="_blank" class="whatsapp-float">
  <img src=\assets\whatsapp.png>
</a>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxarAntDCo15iAJfmRKOnEIFbSmz3YGXfzW9wW5CH4kuzMQy8bciMexxLV7mGVSGhiq/exec";

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get("token");
}

async function activarPassword() {

  const pass1 = document.getElementById("password1").value;
  const pass2 = document.getElementById("password2").value;
  const mensaje = document.getElementById("mensaje");

  if (pass1 !== pass2) {
    mensaje.textContent = "Las contraseñas no coinciden";
    return;
  }

  const response = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "activarPassword",
      token: getToken(),
      password: pass1
    })
  });

  const data = await response.json();

  if (data.success) {
    mensaje.textContent = "Contraseña creada correctamente. Ya puedes iniciar sesión.";
  } else {
    mensaje.textContent = data.message;
  }
}

</script>

</body>
</html>
