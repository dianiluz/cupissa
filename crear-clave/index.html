<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear contraseña - CUPISSA</title>

<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/animations.css">

</head>

<body>

<div id="header"></div>
<div id="mundos"></div>

<main style="padding:120px 20px 80px 20px; display:flex; justify-content:center;">

  <div style="width:360px; background:var(--bg-card); padding:30px; border-radius:var(--radius-medium);">

    <h2 style="margin-bottom:20px;">Crear contraseña</h2>

    <input type="password" id="password1" placeholder="Nueva contraseña"
      style="width:100%;margin-bottom:10px;padding:10px;">

    <input type="password" id="password2" placeholder="Confirmar contraseña"
      style="width:100%;margin-bottom:20px;padding:10px;">

    <button onclick="activarPassword()" class="btn-principal" style="width:100%;">
      Guardar
    </button>

    <p id="mensaje" style="margin-top:15px;"></p>

  </div>

</main>

<div id="footer"></div>

<a href="https://wa.me/573147671380" target="_blank" class="whatsapp-float">
  <img src="/assets/whatsapp.png">
</a>

<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/header.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxarAntDCo15iAJfmRKOnEIFbSmz3YGXfzW9wW5CH4kuzMQy8bciMexxLV7mGVSGhiq/exec";

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get("token");
}

async function activarPassword() {

  const pass1 = document.getElementById("password1").value;
  const pass2 = document.getElementById("password2").value;
  const mensaje = document.getElementById("mensaje");

  if (!pass1 || !pass2) {
    mensaje.textContent = "Debes completar ambos campos";
    return;
  }

  if (pass1 !== pass2) {
    mensaje.textContent = "Las contraseñas no coinciden";
    return;
  }

  try {

    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "activarPassword",
        token: getToken(),
        password: pass1
      })
    });

    const data = await response.json();

    if (data.success) {
      mensaje.textContent = "Contraseña creada correctamente. Ya puedes iniciar sesión.";
    } else {
      mensaje.textContent = data.message;
    }

  } catch (error) {
    mensaje.textContent = "Error al conectar con el servidor.";
  }
}

</script>

</body>
</html>
